# searchseek sldl configuration
#
# Credentials are NOT stored here. The pipeline passes --user / --pass on the
# command line, reading them from the slskd config (see pipeline.ps1).
# This file holds only behavioral settings and profiles.

# Defaults

concurrent-downloads = 3
fast-search = true
no-modify-share-count = true

# Skip already-downloaded files (resume-friendly)
skip-existing = true

# Don't create per-artist subfolders in staging
name-format = {artist} - {title}

# Search filters: minimum file quality acceptable for batch mode
min-bitrate = 128

# Polite to peers
listen-port = 50300


# Profiles

# Activate with: sldl --profile lossless
# Prefer FLAC, fall back to WAV. Reject lossy. Strict-matching to avoid
# Soulseek fuzzy nonsense (Aphex Twin sneaking in when we asked for Session 2).
[lossless]
pref-format = flac,wav
format = flac,wav
# FLAC stereo 44.1/16 typically 600-1000 kbps
min-bitrate = 700
strict-title = true
strict-artist = true
# Necessary length tolerance (s). Only filters candidates whose length is known;
# kept loose-ish so a same-track different-master isn't rejected. The audit does
# the finer proportional +/-10% check post-download. Needs a Length column in the
# input CSV (the scrapers now emit one) to have any effect.
length-tol = 15

# Activate with: sldl --profile lossless-strict
# Lossless containers: FLAC prefere, WAV/AIFF acceptes (beaucoup de DJ partagent en
# WAV/AIFF, pas en FLAC). PAS de strict-title/strict-artist : le strict binaire de sldl
# ratait les vrais resultats juste renommes (ex: "Andre Kraml - Safari" vs la wishlist
# "Andre Kraml Feat ... - Safari (Original Mix)"). On laisse sldl ramener large (fuzzy)
# et c'est la garde d'identite de DDD (token coverage sur le noyau artiste+titre) +
# duree + re-audit spectral qui filtrent intelligemment derriere.
# length-tol filtre quand meme par duree quand la colonne Length est connue.
[lossless-strict]
format = flac,wav,aiff
pref-format = flac,wav,aiff
min-bitrate = 500
length-tol = 15

# Activate with: sldl --profile mp3-fallback
# Repli 2e passe : MP3 320 quand aucun lossless/WAV/AIFF n'est trouvable. min-bitrate
# = 320 applique le ban MP3 < 320 au telechargement (rien sous 320 ne rentre).
[mp3-fallback]
format = mp3,flac,wav,aiff
pref-format = flac,wav,aiff,mp3
min-bitrate = 320
length-tol = 15
